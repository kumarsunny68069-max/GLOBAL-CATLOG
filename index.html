<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLOBALGRAB | Premium Clothing Catalog</title>
    <meta name="description" content="Premium streetwear and baggy clothing catalog featuring oversized t-shirts and relaxed fit jeans.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@700;800&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Welcome Popup -->
    <div class="welcome-popup" id="welcomePopup">
        <div class="welcome-content">
            <h2 class="welcome-greeting">नमस्ते</h2>
            <h2 class="welcome-text">GLOBAL GRAB में आपका स्वागत है!</h2>
        </div>
    </div>

    <nav class="navbar">
        <div class="logo">GLOBALGRAB</div>
        <ul class="nav-links">
            <li><a href="#" class="active" data-filter="all">All</a></li>
            <li><a href="#" data-filter="tshirts">T-Shirts</a></li>
            <li><a href="#" data-filter="jeans">Jeans</a></li>
        </ul>
        <div class="cart-icon">🛒</div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1>Redefine Comfort.</h1>
            <p>Premium oversized and baggy streetwear designed for the modern aesthetic.</p>
            <button class="cta-btn">Shop Collection</button>
        </div>
    </header>

    <main class="catalog-section">
        <div class="catalog-grid" id="catalogGrid">
            <!-- Items injected by JS -->
        </div>
    </main>

    <!-- Product Modal -->
    <div class="modal-overlay" id="productModal">
        <div class="modal-content">
            <button class="close-modal" id="closeModal">&times;</button>
            <div class="modal-layout">
                <div class="modal-image-container">
                    <img src="" alt="Product Image" id="modalImage">
                </div>
                <div class="modal-details">
                    <h2 id="modalTitle">Product Title</h2>
                    <p class="price" id="modalPrice">$0.00</p>
                    <p class="description" id="modalDesc">Product description here.</p>
                    
                    <div class="size-selector">
                        <span>Size:</span>
                        <div class="sizes">
                            <button class="size-btn">S</button>
                            <button class="size-btn">M</button>
                            <button class="size-btn">L</button>
                            <button class="size-btn">XL</button>
                        </div>
                    </div>
                    
                    <button class="add-to-cart-btn">Add to Cart</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Checkout Modal -->
    <div class="modal-overlay" id="checkoutModal">
        <div class="modal-content checkout-content">
            <button class="close-modal" id="closeCheckout">&times;</button>
            <div class="checkout-layout">
                <div class="checkout-summary">
                    <h3>Order Summary</h3>
                    <div class="summary-item">
                        <img src="" alt="Article Image" id="checkoutImage">
                        <div class="summary-details">
                            <h4 id="checkoutTitle">Product</h4>
                            <p>Size: <span id="checkoutSize">M</span></p>
                            <p class="price" id="checkoutPrice">$0.00</p>
                        </div>
                    </div>
                </div>
                <div class="checkout-form-container">
                    <h3>Delivery Details</h3>
                    <form id="checkoutForm">
                        <div class="input-group">
                            <label for="cName">Full Name</label>
                            <input type="text" id="cName" required placeholder="John Doe">
                        </div>
                        <div class="input-group">
                            <label for="cPhone">Phone Number</label>
                            <input type="tel" id="cPhone" required placeholder="+91 9317091542">
                        </div>
                        <div class="input-group">
                            <label for="cAddress">Complete Address</label>
                            <textarea id="cAddress" required rows="3" placeholder="Street, City, State, Pincode"></textarea>
                        </div>
                        <button type="submit" class="whatsapp-btn">
                            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.287l-.582 2.128 2.182-.573c.978.58 1.911.928 3.145.929 3.178 0 5.767-2.587 5.768-5.766.001-3.187-2.575-5.77-5.764-5.771zm3.392 8.244c-.144.405-.837.774-1.17.824-.299.045-.677.063-1.092-.069-.252-.08-.575-.187-.988-.365-1.739-.751-2.874-2.502-2.961-2.617-.087-.116-.708-.94-.708-1.793s.448-1.273.607-1.446c.159-.173.346-.217.462-.217l.332.006c.106.005.249-.04.39.298.144.347.491 1.2.534 1.287.043.087.072.188.014.304-.058.116-.087.188-.173.289l-.26.304c-.087.086-.177.18-.076.354.101.174.449.741.964 1.201.662.591 1.221.774 1.394.86s.274.072.376-.043c.101-.116.433-.506.549-.68.116-.173.231-.145.39-.087s1.011.477 1.184.564.289.13.332.202c.045.072.045.419-.1.824zm-3.423-14.416c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12-5.373-12-12-12zm.082 21.13c-1.494 0-2.939-.379-4.22-.1.096l-4.711 1.236 1.258-4.595c-3.136-2.222-2.518-7.854 1.341-10.742 2.656-1.993 6.314-2.146 9.155-.386 2.842 1.758 4.298 5.161 3.738 8.42-1.077 6.223-7.553 9.479-13.435 6.096z"/></svg>
                            Order via WhatsApp
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
