<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Grab - Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #0f1115; color: white; padding: 20px; }
        .product-list { display: flex; flex-direction: column; gap: 15px; max-width: 800px; margin: 0 auto; }
        .product-item { background: #1a1c23; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .product-info { display: flex; align-items: center; gap: 15px; }
        .product-info img { width: 50px; height: 50px; border-radius: 5px; object-fit: cover; }
        .product-details h3 { margin: 0 0 5px 0; font-size: 1rem; }
        .product-details p { margin: 0; color: #aaa; font-size: 0.8rem; }
        .toggle-btn { padding: 10px 20px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; transition: opacity 0.3s ease; }
        .toggle-btn:hover { opacity: 0.8; }
        .in-stock { background: #4CAF50; color: white; }
        .out-stock { background: #F44336; color: white; }
        .header { text-align: center; margin-bottom: 30px; }
        #initBtn { display: block; margin: 0 auto 30px auto; padding: 10px 20px; background: #d4af37; color: black; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #statusMessage { text-align: center; color: #d4af37; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Inventory Management</h1>
        <p>Toggle products to mark them out of stock.</p>
    </div>
    
    <div id="statusMessage">Connecting to database...</div>
    <button id="initBtn" style="display:none;">Initialize Database (Run this only once)</button>

    <div class="product-list" id="adminGrid">
        <!-- Products will load here -->
    </div>

    <!-- Firebase SDK (Module version) -->
    <script type="module" src="admin.js"></script>
</body>
</html>
