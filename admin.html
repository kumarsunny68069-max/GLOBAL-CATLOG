<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Grab - Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #0f1115; color: white; padding: 20px; }
        .product-list { display: flex; flex-direction: column; gap: 15px; max-width: 800px; margin: 0 auto; }
        .product-item { background: #1a1c23; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
        .product-info { display: flex; align-items: center; gap: 15px; }
        .product-info img { width: 50px; height: 50px; border-radius: 5px; object-fit: cover; }
        .product-details h3 { margin: 0 0 5px 0; font-size: 1rem; }
        .product-details p { margin: 0; color: #aaa; font-size: 0.8rem; }
        .toggle-btn { padding: 10px 20px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; transition: opacity 0.3s ease; }
        .toggle-btn:hover { opacity: 0.8; }
        .in-stock { background: #4CAF50; color: white; }
        .out-stock { background: #F44336; color: white; }
        .header { text-align: center; margin-bottom: 30px; }
        #initBtn { display: block; margin: 0 auto 30px auto; padding: 10px 20px; background: #d4af37; color: black; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #statusMessage { text-align: center; color: #d4af37; margin-bottom: 20px; }
        
        /* Form Styles */
        .admin-section { max-width: 800px; margin: 0 auto 40px auto; background: #1a1c23; padding: 25px; border-radius: 12px; border: 1px solid #333; }
        .admin-section h2 { margin-top: 0; color: #d4af37; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #ccc; font-size: 0.9rem; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; background: #0f1115; border: 1px solid #444; color: white; border-radius: 6px; box-sizing: border-box; }
        .form-row { display: flex; gap: 15px; }
        .form-row .form-group { flex: 1; }
        
        .color-variants-container { margin-top: 15px; border: 1px dashed #444; padding: 15px; border-radius: 6px; }
        .color-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: flex-end; }
        .color-row input[type="text"] { flex: 1; }
        .remove-color-btn { background: #F44336; color: white; border: none; border-radius: 4px; padding: 10px; cursor: pointer; }
        .add-color-btn { background: #444; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; margin-top: 5px; }
        
        .submit-btn { width: 100%; padding: 12px; background: #d4af37; color: black; border: none; border-radius: 6px; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin-top: 20px; }
        .submit-btn:disabled { background: #555; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Inventory Management</h1>
        <p>Toggle products to mark them out of stock.</p>
    </div>
    
    <div id="statusMessage">Connecting to database...</div>
    <button id="initBtn" style="display:none;">Initialize Database (Run this only once)</button>

    <div class="admin-section" id="addProductSection">
        <h2>Add New Product</h2>
        <form id="addProductForm">
            <div class="form-row">
                <div class="form-group">
                    <label>Product Title</label>
                    <input type="text" id="pTitle" required placeholder="e.g. Vintage Denim Jacket">
                </div>
                <div class="form-group">
                    <label>Price</label>
                    <input type="text" id="pPrice" required placeholder="e.g. ₹1299">
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Category</label>
                    <select id="pCategory" required>
                        <option value="tshirts">T-Shirts</option>
                        <option value="jeans">Jeans</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Base Product Image URL</label>
                    <input type="text" id="pImage" required placeholder="e.g. assets/image.png or https://...">
                </div>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea id="pDesc" rows="3" required placeholder="Enter product description..."></textarea>
            </div>

            <div class="color-variants-container">
                <label style="color: #ccc; font-size: 0.9rem; display:block; margin-bottom:10px;">Color Variants (Optional)</label>
                <div id="colorRows">
                    <!-- Dynamic color rows go here -->
                </div>
                <button type="button" class="add-color-btn" id="addColorBtn">+ Add Color Variant</button>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Add Product</button>
        </form>
    </div>

    <div class="admin-section">
        <h2>Current Inventory</h2>
        <div class="product-list" id="adminGrid">
            <!-- Products will load here -->
        </div>
    </div>

    <!-- Firebase SDK (Module version) -->
    <script type="module" src="admin.js"></script>
</body>
</html>
